<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | PILLPOINTONE</title>
    <style>
        :root {
            --primary: #4f46e5;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }
        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: var(--text-dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            max-width: 400px;
            width: 100%;
        }
        img {
            width: 120px;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }
        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn {
            background: var(--primary);
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: transform 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .offline-icon {
            font-size: 3rem;
            color: #ef4444;
            margin-bottom: 1rem;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <img src="/images/logo.png" alt="PILLPOINTONE Logo">
        <div class="offline-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.72 11.06A5 5 0 0 1 20 16m-4.11-4.11a5 5 0 0 0-3.32-3.32"/><path d="m1 1 22 22"/><path d="M5 12.91A5 5 0 0 0 9 19"/><path d="m16.5 16.5.6.6"/><path d="m9 9 1.1 1.1"/><path d="M15 9c1.1 0 2 .9 2 2"/><path d="M9 15c0 1.1.9 2 2 2"/></svg>
        </div>
        <h1>Offline Mode Active</h1>
        <p>You can continue using the system! Your sales and updates will be saved locally and synchronized automatically once your connection is restored.</p>
        <button class="btn" onclick="window.location.href='/'">Return to Dashboard</button>
    </div>
</body>
</html>
